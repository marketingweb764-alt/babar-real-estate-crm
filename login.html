<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Babar Real Estate CRM</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #111; padding: 40px 30px; border-radius: 20px; border: 1px solid #D4AF37; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(212, 175, 55, 0.1); }
        h1 { color: #D4AF37; font-size: 22px; margin-bottom: 30px; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #D4AF37; outline: none; }
        .login-btn { width: 100%; padding: 15px; background: #D4AF37; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .login-btn:hover { background: #fff; transform: translateY(-3px); }
        .footer { margin-top: 25px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>CRM LOGIN</h1>
    <p style="color: #666; font-size: 12px; margin-bottom: 20px;">Enter credentials to access Babar Real Estate Portal</p>
    
    <input type="password" id="passCode" placeholder="Enter PIN (e.g. 1234)">
    <button class="login-btn" onclick="checkLogin()">UNLOCK SYSTEM</button>
    
    <div class="footer">Developed By Bilal Mughal Official</div>
</div>

<script>
    function checkLogin() {
        const code = document.getElementById('passCode').value;
        // Hum password "1234" rakh rahe hain, aap baad mein badal sakte hain
        if(code === "1234") {
            sessionStorage.setItem('loggedIn', 'true');
            window.location.href = "index.html";
        } else {
            alert("Wrong PIN! Please try again.");
        }
    }
</script>

</body>
</html>
