<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #D4AF37; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1); }
        h1 { color: #D4AF37; font-size: 22px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .login-btn { background: linear-gradient(45deg, #D4AF37, #b8860b); color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        p { font-size: 10px; color: #555; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Babar Real Estate</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="login-btn" onclick="checkLogin()">Login to CRM</button>
    <p>POST BY BILAL MUGHAL</p>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Aapka Secret Password
        if(user === "admin" && pass === "babar786") {
            sessionStorage.setItem('userRole', 'CEO');
            window.location.href = "index.html"; // Login ke baad Dashboard par jayega
        } else {
            alert("Ghalat Password! Bilal bhai se rabta karein.");
        }
    }
</script>
</body>
</html>
