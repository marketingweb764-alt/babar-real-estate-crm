<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Management - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 20px; margin: 0; text-transform: uppercase; }
        .back-btn { color: #fff; text-decoration: none; font-size: 12px; border: 1px solid #555; padding: 6px 12px; border-radius: 5px; }

        /* Search Bar */
        .search-container { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; outline: none; }
        #searchInput:focus { border-color: #D4AF37; }

        /* Add Lead Form */
        .lead-form { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .add-btn { background: #D4AF37; color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Lead Cards */
        .lead-card { background: #1a1a1a; border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; position: relative; }
        .lead-status { position: absolute; top: 15px; right: 15px; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        
        /* Status Colors */
        .status-new { background: rgba(136, 136, 136, 0.2); color: #888; border: 1px solid #888; }
        .status-followup { background: rgba(241, 196, 15, 0.2); color: #f1c40f; border: 1px solid #f1c40f; }
        .status-meeting { background: rgba(52, 152, 219, 0.2); color: #3498db; border: 1px solid #3498db; }
        .status-closed { background: rgba(39, 174, 96, 0.2); color: #27ae60; border: 1px solid #27ae60; }

        .lead-card h3 { margin: 0; color: #D4AF37; font-size: 16px; }
        .lead-card p { margin: 5px 0; font-size: 13px; color: #ccc; }
        .added-by { font-size: 10px; color: #666; margin-top: 10px; display: block; border-top: 1px solid #222; padding-top: 8px; }
        
        .card-actions { display: flex; gap: 10px; margin-top: 12px; }
        .update-btn { background: #333; color: #fff; border: none; padding: 6px 12px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        .del-btn { background: #e74c3c; color: #fff; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>Lead Management</h1>
    <a href="index.html" class="back-btn">← Home</a>
</div>

<div class="search-container">
    <input type="text" id="searchInput" onkeyup="searchLeads()" placeholder="Search by Client Name, Phone or Added By...">
</div>

<div class="lead-form">
    <h2 style="font-size: 14px; margin-bottom: 15px; color: #D4AF37;">Add New Potential Client</h2>
    <input type="text" id="lName" placeholder="Client Name">
    <input type="text" id="lPhone" placeholder="Phone Number">
    <select id="lStatus">
        <option value="New">New Lead</option>
        <option value="Follow-up">Follow-up</option>
        <option value="Meeting">Meeting Done</option>
        <option value="Closed">Closed / Sold</option>
    </select>
    <textarea id="lNote" placeholder="Interest (e.g. DHA Ph 7, 10 Marla)"></textarea>
    <button class="add-btn" onclick="addLead()">Save Lead</button>
</div>

<div id="leadsList"></div>

<script>
    const userRole = sessionStorage.getItem('userRole');
    const userName = sessionStorage.getItem('userName');

    window.onload = displayLeads;

    function addLead() {
        const name = document.getElementById('lName').value;
        const phone = document.getElementById('lPhone').value;
        const status = document.getElementById('lStatus').value;
        const note = document.getElementById('lNote').value;

        if(!name || !phone) return alert("Client name and phone are required!");

        let leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        leads.unshift({ 
            id: Date.now(), 
            name, 
            phone, 
            status, 
            note, 
            addedBy: userName,
            date: new Date().toLocaleDateString() 
        });
        
        localStorage.setItem('babar_leads', JSON.stringify(leads));
        
        // Reset Form
        document.getElementById('lName').value = '';
        document.getElementById('lPhone').value = '';
        document.getElementById('lNote').value = '';
        
        displayLeads();
    }

    function displayLeads() {
        let leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        const container = document.getElementById('leadsList');
        
        // CEO can see all, Team only sees their own
        if(userRole !== 'CEO') {
            leads = leads.filter(l => l.addedBy === userName);
        }

        container.innerHTML = leads.map(l => `
            <div class="lead-card lead-item">
                <span class="lead-status status-${l.status.toLowerCase().replace(' ', '')}">${l.status}</span>
                <h3>${l.name}</h3>
                <p>📞 ${l.phone}</p>
                <p style="color:#888;">📝 ${l.note}</p>
                <div class="card-actions">
                    <button class="update-btn" onclick="updateStatus(${l.id})">Change Status</button>
                    ${userRole === 'CEO' ? `<button class="del-btn" onclick="deleteLead(${l.id})">🗑️</button>` : ''}
                </div>
                <span class="added-by">Added by: ${l.addedBy} | ${l.date}</span>
            </div>
        `).join('') || '<p style="text-align:center; color:#444;">No leads found.</p>';
    }

    function updateStatus(id) {
        let leads = JSON.parse(localStorage.getItem('babar_leads'));
        let l = leads.find(x => x.id == id);
        
        const statuses = ['New', 'Follow-up', 'Meeting', 'Closed'];
        let currentIndex = statuses.indexOf(l.status);
        let nextIndex = (currentIndex + 1) % statuses.length;
        l.status = statuses[nextIndex];
        
        localStorage.setItem('babar_leads', JSON.stringify(leads));
        displayLeads();
    }

    function searchLeads() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let items = document.getElementsByClassName('lead-item');
        for (let i = 0; i < items.length; i++) {
            let text = items[i].innerText.toLowerCase();
            items[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    function deleteLead(id) {
        if(confirm("Delete this lead?")) {
            let leads = JSON.parse(localStorage.getItem('babar_leads'));
            leads = leads.filter(x => x.id != id);
            localStorage.setItem('babar_leads', JSON.stringify(leads));
            displayLeads();
        }
    }
</script>

</body>
</html>
