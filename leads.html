<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Entry - Babar Real Estate</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; }
        .form-card { border: 2px solid #D4AF37; padding: 30px; border-radius: 20px; background: #111; max-width: 450px; margin: auto; box-shadow: 0 0 15px rgba(212,175,55,0.1); }
        h2 { letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-size: 16px; }
        .save-btn { background: #D4AF37; color: #000; padding: 15px; width: 95%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .save-btn:hover { background: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>New Client Entry</h2>
        <input type="text" id="name" placeholder="Client Full Name">
        <input type="text" id="phone" placeholder="Phone (e.g. 0300...)">
        
        <select id="location">
            <option value="">Select Phase/Project</option>
            <option value="DHA Phase 6">DHA Phase 6</option>
            <option value="DHA Phase 7">DHA Phase 7</option>
            <option value="DHA Quetta">DHA Quetta</option>
            <option value="DHA Bahawalpur">DHA Bahawalpur</option>
            <option value="Luxury Bungalow">Luxury Bungalow (1/2 Kanal)</option>
        </select>

        <input type="text" id="budget" placeholder="Budget (e.g. 5.5 Crore)">
        
        <button class="save-btn" onclick="submitToSheet()">SUBMIT TO CRM</button>
    </div>

    <script>
        function submitToSheet() {
            const name = document.getElementById('name').value;
            if(name) {
                alert("Processing Lead for: " + name);
                // Database connection logic goes here
            } else {
                alert("Please enter at least the client name.");
            }
        }
    </script>
</body>
</html>
