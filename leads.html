<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Manager - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 20px; margin: 0; }
        .back-btn { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; }

        /* Form Styling */
        .lead-form { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #D4AF37; margin-bottom: 30px; }
        .lead-form input, .lead-form select, .lead-form textarea { 
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box;
        }
        .submit-btn { background: #D4AF37; color: #000; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* List Styling */
        .lead-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #D4AF37; }
        .lead-card h3 { margin: 0 0 5px; font-size: 16px; color: #D4AF37; }
        .lead-card p { margin: 2px 0; font-size: 13px; color: #aaa; }
        .lead-card .tag { display: inline-block; background: #333; padding: 3px 8px; border-radius: 4px; font-size: 10px; margin-top: 5px; text-transform: uppercase; }
        
        .empty-msg { text-align: center; color: #555; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1>CLIENT LEADS</h1>
    <a href="index.html" class="back-btn">← Back</a>
</div>

<div class="lead-form">
    <h2 style="font-size: 16px; margin-bottom: 15px;">Add New Inquiry</h2>
    <input type="text" id="clientName" placeholder="Client Name" required>
    <input type="tel" id="clientPhone" placeholder="Phone Number" required>
    <select id="propertyInterest">
        <option value="Residential Plot">Residential Plot</option>
        <option value="Commercial Plot">Commercial Plot</option>
        <option value="Luxury Bungalow">Luxury Bungalow</option>
        <option value="File Only">File Only</option>
    </select>
    <textarea id="notes" placeholder="Additional Notes (e.g. 1 Kanal DHA Phase 6)"></textarea>
    <button class="submit-btn" onclick="saveLead()">SAVE LEAD</button>
</div>

<h2 style="font-size: 18px; margin-bottom: 15px;">Recent Inquiries</h2>
<div id="leadsList">
    <p class="empty-msg">No leads added yet.</p>
</div>

<script>
    // Save Data to LocalStorage
    function saveLead() {
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;
        const interest = document.getElementById('propertyInterest').value;
        const notes = document.getElementById('notes').value;

        if(!name || !phone) { alert("Please fill Name and Phone"); return; }

        const newLead = { name, phone, interest, notes, date: new Date().toLocaleDateString() };
        
        let leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        leads.unshift(newLead); // Add new lead to the top
        localStorage.setItem('babar_leads', JSON.stringify(leads));

        // Clear Form
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('notes').value = '';

        displayLeads();
    }

    // Display Data
    function displayLeads() {
        const leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        const container = document.getElementById('leadsList');
        
        if(leads.length === 0) {
            container.innerHTML = '<p class="empty-msg">No leads added yet.</p>';
            return;
        }

        container.innerHTML = leads.map(lead => `
            <div class="lead-card">
                <h3>${lead.name}</h3>
                <p>📞 ${lead.phone}</p>
                <p>📝 ${lead.notes}</p>
                <div class="tag">${lead.interest}</div>
                <div style="float:right; font-size:10px; color:#555;">${lead.date}</div>
            </div>
        `).join('');
    }

    // Load on start
    window.onload = displayLeads;
</script>

</body>
</html>
