<script type="module">
  // Firebase SDKs
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Aapki Firebase Configuration (Wahi jo pehle thi)
  const firebaseConfig = {
    apiKey: "AIzaSy...", // Bilal bhai, yahan apni purani API Key paste karein
    authDomain: "babar-realestate-crm.firebaseapp.com",
    projectId: "babar-realestate-crm",
    storageBucket: "babar-realestate-crm.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  // Initialize Firebase & Firestore
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Lead Save Karne ka Function
  const leadForm = document.getElementById('leadForm');
  if(leadForm) {
    leadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const clientName = document.getElementById('clientName').value;
      const clientPhone = document.getElementById('clientPhone').value;
      const interest = document.getElementById('propertyInterest').value;

      try {
        await addDoc(collection(db, "leads"), {
          name: clientName,
          phone: clientPhone,
          property: interest,
          timestamp: serverTimestamp()
        });
        alert("🎉 Lead Saved Successfully in Cloud!");
        leadForm.reset();
      } catch (error) {
        console.error("Error adding document: ", error);
        alert("Error: Data save nahi hua.");
      }
    });
  }
</script>
