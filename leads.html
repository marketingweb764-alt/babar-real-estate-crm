<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 18px; margin: 0; }
        .back-btn { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; }

        .form-section { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .add-btn { background: #D4AF37; color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .lead-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #D4AF37; position: relative; }
        .lead-card h3 { margin: 0; color: #D4AF37; font-size: 16px; }
        .lead-card p { margin: 5px 0; font-size: 13px; color: #bbb; }
        .added-by { font-size: 10px; color: #D4AF37; text-transform: uppercase; margin-top: 10px; display: block; background: rgba(212, 175, 55, 0.1); padding: 2px 5px; width: fit-content; border-radius: 4px; }
        
        .whatsapp-btn { display: inline-block; background: #25D366; color: white; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 12px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>Team Leads</h1>
    <a href="index.html" class="back-btn">← Home</a>
</div>

<div class="form-section">
    <input type="text" id="clientName" placeholder="Client Name">
    <input type="text" id="clientPhone" placeholder="Phone Number (e.g. 923001234567)">
    <input type="text" id="propertyInterest" placeholder="Property Interest (e.g. 5 Marla DHA)">
    <button class="add-btn" onclick="saveLead()">SUBMIT LEAD</button>
</div>

<div id="leadsList"></div>

<script>
    // Current User Info
    const currentUserName = sessionStorage.getItem('userName') || "Unknown Member";

    function saveLead() {
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;
        const interest = document.getElementById('propertyInterest').value;

        if(!name || !phone) { alert("Fill name and phone!"); return; }

        let leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        leads.unshift({
            name, phone, interest, 
            addedBy: currentUserName,
            date: new Date().toLocaleDateString()
        });

        localStorage.setItem('babar_leads', JSON.stringify(leads));
        
        // Clear inputs
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('propertyInterest').value = '';

        displayLeads();
    }

    function displayLeads() {
        const leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        const container = document.getElementById('leadsList');
        
        container.innerHTML = leads.map(l => `
            <div class="lead-card">
                <h3>${l.name}</h3>
                <p>📞 ${l.phone}</p>
                <p>🏠 Interest: ${l.interest}</p>
                <span class="added-by">Added By: ${l.addedBy}</span>
                <br>
                <a href="https://wa.me/${l.phone}" target="_blank" class="whatsapp-btn">💬 WhatsApp Client</a>
            </div>
        `).join('');
    }

    window.onload = displayLeads;
</script>

</body>
</html>
