<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Management - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 18px; margin: 0; text-transform: uppercase; }
        .back-btn { color: #fff; text-decoration: none; font-size: 12px; border: 1px solid #333; padding: 8px 15px; border-radius: 8px; background: #111; }

        /* Summary Button Style */
        .summary-btn { background: linear-gradient(45deg, #D4AF37, #b8860b); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; width: 100%; text-transform: uppercase; }

        .form-container { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        
        /* Priority Colors */
        .priority-high { border-left: 5px solid #ff4d4d !important; box-shadow: 0 0 10px rgba(255, 77, 77, 0.2); }
        .priority-medium { border-left: 5px solid #ffa500 !important; }
        .priority-low { border-left: 5px solid #2ecc71 !important; }

        .lead-card { background: #161616; border-radius: 15px; padding: 20px; border: 1px solid #222; margin-bottom: 15px; position: relative; }
        .status-tag { position: absolute; top: 15px; right: 15px; font-size: 9px; font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .status-new { background: #444; color: #fff; }
        .status-follow-up { background: #f1c40f; color: #000; }
        .status-closed { background: #2ecc71; color: #000; }

        .btn-group { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .btn-wa { background: #25D366; color: #fff; border: none; padding: 10px; border-radius: 8px; font-size: 11px; flex: 1; cursor: pointer; }
        .btn-ceo { background: #D4AF37; color: #000; border: none; padding: 10px; border-radius: 8px; font-size: 11px; flex: 1; cursor: pointer; }
        .submit-btn { background: #D4AF37; color: #000; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>Leads Management</h1>
    <a href="index.html" class="back-btn">← Home</a>
</div>

<button class="summary-btn" onclick="sendDailySummary()">📊 Send Daily Summary to CEO</button>

<div class="form-container">
    <input type="text" id="lName" placeholder="Client Name">
    <input type="text" id="lPhone" placeholder="Phone Number">
    <select id="lPriority">
        <option value="low">Low Priority</option>
        <option value="medium" selected>Medium Priority</option>
        <option value="high">🔥 HIGH PRIORITY (VIP)</option>
    </select>
    <textarea id="lNote" placeholder="Plot requirements..."></textarea>
    <button class="submit-btn" onclick="addLead()">Save Lead</button>
</div>

<div id="leadsList"></div>

<script>
    const userRole = sessionStorage.getItem('userRole');
    const userName = sessionStorage.getItem('userName') || 'Team Member';
    const CEO_NUMBER = '923244000041';

    window.onload = displayLeads;

    function addLead() {
        const name = document.getElementById('lName').value;
        const phone = document.getElementById('lPhone').value;
        const priority = document.getElementById('lPriority').value;
        const note = document.getElementById('lNote').value;
        if(!name || !phone) return alert("Please fill Name and Phone!");

        let leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        leads.unshift({ 
            id: Date.now(), name, phone, priority, note, 
            status: 'New', addedBy: userName, date: new Date().toLocaleDateString() 
        });
        localStorage.setItem('babar_leads', JSON.stringify(leads));
        
        document.getElementById('lName').value = '';
        document.getElementById('lPhone').value = '';
        displayLeads();
    }

    function displayLeads() {
        let leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        const container = document.getElementById('leadsList');
        if(userRole !== 'CEO') leads = leads.filter(l => l.addedBy === userName);

        container.innerHTML = leads.map(l => `
            <div class="lead-card priority-${l.priority}">
                <span class="status-tag status-${l.status.toLowerCase()}">${l.status}</span>
                <h3>${l.name} ${l.priority === 'high' ? '⭐' : ''}</h3>
                <p>📞 ${l.phone}</p>
                <p style="color:#888; font-size:12px;">${l.note}</p>
                
                <div class="btn-group">
                    <button class="btn-wa" onclick="contactWA('${l.phone}', '${l.name}')">📲 CLIENT</button>
                    <button class="btn-ceo" onclick="reportToCEO('${l.id}')">📢 REPORT CEO</button>
                </div>
            </div>
        `).join('');
    }

    function sendDailySummary() {
        const leads = JSON.parse(localStorage.getItem('babar_leads')) || [];
        const today = new Date().toLocaleDateString();
        const todaysLeads = leads.filter(l => l.date === today);
        
        const high = todaysLeads.filter(l => l.priority === 'high').length;
        const total = todaysLeads.length;

        let msg = `*DAILY PROGRESS REPORT - BABAR REAL ESTATE*%0A%0A📅 *Date:* ${today}%0A👤 *Reported by:* ${userName}%0A%0A✅ *Total Leads Today:* ${total}%0A🔥 *High Priority:* ${high}%0A%0A_System is working perfectly!_`;
        window.open(`https://wa.me/${CEO_NUMBER}?text=${msg}`, '_blank');
    }

    function contactWA(phone, name) {
        let clean = phone.replace(/\D/g, ''); 
        if(!clean.startsWith('92')) clean = '92' + clean.replace(/^0+/, '');
        const msg = `Salam *${name}*, Babar Real Estate se rabta karne ka shukria. Humari team aap se jald mazeed details share karegi.`;
        window.open(`https://wa.me/${clean}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function reportToCEO(id) {
        const l = (JSON.parse(localStorage.getItem('babar_leads'))).find(x => x.id == id);
        const msg = `*NEW LEAD REPORT*%0A%0A👤 *Client:* ${l.name}%0A📊 *Priority:* ${l.priority.toUpperCase()}%0A📝 *Note:* ${l.note}`;
        window.open(`https://wa.me/${CEO_NUMBER}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
