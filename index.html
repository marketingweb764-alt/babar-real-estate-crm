<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate - CRM Dashboard</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); padding: 30px 20px 40px; text-align: center; border-bottom: 2px solid #D4AF37; position: relative; }
        .main-logo { width: 80px; margin-bottom: 20px; }
        .ceo-profile { width: 100px; height: 100px; border: 3px solid #D4AF37; border-radius: 50%; margin: 0 auto 15px; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3); cursor: pointer; }
        .ceo-profile img { width: 100%; height: 100%; object-fit: cover; }
        .logout-btn { position: absolute; top: 20px; right: 20px; background: none; color: #e74c3c; border: 1px solid #e74c3c; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; }
        header h1 { color: #D4AF37; margin: 5px 0; font-size: 20px; text-transform: uppercase; }
        .role-tag { display: inline-block; background: #D4AF37; color: #000; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .stats-bar { background: #D4AF37; color: #000; margin: -20px 20px 20px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-around; text-align: center; position: relative; z-index: 10; font-weight: bold; }
        .stats-bar span { display: block; font-size: 16px; }
        .stats-bar small { font-size: 9px; text-transform: uppercase; opacity: 0.8; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 20px; max-width: 600px; margin: auto; }
        .card { background: #111; border: 1px solid #333; padding: 20px 10px; border-radius: 15px; text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .icon { font-size: 28px; margin-bottom: 10px; }
        .card h3 { color: #D4AF37; margin: 0; font-size: 13px; text-transform: uppercase; }
        .card p { color: #666; font-size: 9px; margin: 5px 0 0; }
        .admin-card { border: 1px dashed #D4AF37; background: rgba(212, 175, 55, 0.05); }
    </style>
</head>
<body>

<script>
    if (sessionStorage.getItem('loggedIn') !== 'true') { window.location.href = "login.html"; }
    const userName = sessionStorage.getItem('userName');
    const userRole = sessionStorage.getItem('userRole');
</script>

<header>
    <button class="logout-btn" onclick="logout()">Logout</button>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEVvI7eYhezjFs4kCMSVpRh4W6Uoap6i4yXQ&s" class="main-logo">
    <div class="ceo-profile" onclick="window.location.href='profile.html'">
        <img id="userImg" src="">
    </div>
    <h1 id="displayUserName">Welcome</h1>
    <div class="role-tag" id="displayRole">Loading...</div>
    <p style="font-size: 9px; color: #888; margin-top: 10px;">Click photo to change profile</p>
</header>

<div class="stats-bar">
    <div><small>Team</small><span id="teamCount">0</span></div>
    <div><small>Leads</small><span id="totalLeads">0</span></div>
    <div><small>Tasks</small><span id="taskCount">0</span></div>
</div>

<div class="grid-container">
    <a href="inventory.html" class="card">
        <span class="icon">🏠</span>
        <h3>Inventory</h3>
        <p>Plot Listings</p>
    </a>
    <a href="leads.html" class="card">
        <span class="icon">👥</span>
        <h3>Add Lead</h3>
        <p>New Client</p>
    </a>
    <a href="tasks.html" class="card">
        <span class="icon">📋</span>
        <h3>Tasks</h3>
        <p>Assignments</p>
    </a>
    <a href="calculator.html" class="card">
        <span class="icon">🧮</span>
        <h3>Calculator</h3>
        <p>Installments</p>
    </a>
    <a href="team.html" class="card admin-card" id="adminLink" style="display:none;">
        <span class="icon">🛡️</span>
        <h3>Management</h3>
        <p>Team Control</p>
    </a>
</div>

<script>
    // Profile Pic Logic
    const savedPic = localStorage.getItem('userPic_' + userName);
    const defaultCEO = 'https://zameen-images-live.s3-eu-west-1.amazonaws.com/user_profile/44c7a7f3-65d0-4e9b-8b46-64872ad46a2d/full.jpg';
    const defaultTeam = 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

    document.getElementById('displayUserName').innerText = userName;
    document.getElementById('displayRole').innerText = userRole;

    if(savedPic) {
        document.getElementById('userImg').src = savedPic;
    } else {
        document.getElementById('userImg').src = (userRole === 'CEO') ? defaultCEO : defaultTeam;
    }

    // Role Security
    if(userRole === 'CEO') {
        document.getElementById('adminLink').style.display = 'flex';
    }

    // Stats
    document.getElementById('totalLeads').innerText = (JSON.parse(localStorage.getItem('babar_leads')) || []).length;
    document.getElementById('teamCount').innerText = (JSON.parse(localStorage.getItem('crm_users')) || []).length;
    document.getElementById('taskCount').innerText = (JSON.parse(localStorage.getItem('babar_tasks')) || []).length;

    function logout() { sessionStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
