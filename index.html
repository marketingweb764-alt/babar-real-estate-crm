<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate | Pro CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        .gold-bg { background: var(--gold); color: #000; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="authPage" class="page active max-w-md mx-auto mt-20 text-center">
        <h1 class="text-3xl font-bold mb-2 text-[#d4af37]">BABAR REAL ESTATE</h1>
        <p class="text-xs text-gray-500 mb-8 uppercase tracking-widest">Premium Executive Access</p>
        
        <div id="loginForm">
            <input type="email" id="email" placeholder="Gmail Address">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleLogin()" class="w-full py-3 gold-bg font-bold rounded-lg mt-2">LOGIN TO CRM</button>
            <div class="flex justify-between mt-4 text-xs text-gray-400">
                <span onclick="toggleAuth('forget')" class="cursor-pointer hover:text-white">Forget Password?</span>
                <span onclick="toggleAuth('register')" class="cursor-pointer hover:text-white">Create Account</span>
            </div>
        </div>

        <div id="registerForm" class="hidden">
            <input type="email" id="regEmail" placeholder="Enter Gmail">
            <input type="password" id="regPass" placeholder="Create Password">
            <button onclick="handleRegister()" class="w-full py-3 gold-bg font-bold rounded-lg mt-2">REGISTER</button>
            <p onclick="toggleAuth('login')" class="mt-4 text-xs cursor-pointer">Back to Login</p>
        </div>

        <div id="forgetForm" class="hidden">
            <input type="email" id="forEmail" placeholder="Your Gmail Address">
            <button onclick="handleForget()" class="w-full py-3 gold-bg font-bold rounded-lg mt-2">SEND RESET LINK</button>
            <p onclick="toggleAuth('login')" class="mt-4 text-xs cursor-pointer">Back to Login</p>
        </div>
        <p class="mt-10 text-[10px] text-gray-600 tracking-widest">POST BY BILAL MUGHAL</p>
    </div>

    <div id="dashboardPage" class="page">
        <div class="flex justify-between items-center mb-10 border-b border-gray-800 pb-4">
            <h2 class="text-[#d4af37] font-bold">CEO PORTAL</h2>
            <button onclick="logout()" class="text-red-500 text-xs">Logout</button>
        </div>
        <div class="grid grid-cols-1 gap-4">
            <div onclick="showPage('leadsPage')" class="p-6 border border-gray-800 rounded-xl bg-[#111] hover:border-[#d4af37] cursor-pointer">
                <h3 class="text-xl font-bold">+ Add Leads</h3>
            </div>
            <div onclick="showPage('teamPage')" class="p-6 border border-gray-800 rounded-xl bg-[#111] hover:border-[#d4af37] cursor-pointer">
                <h3 class="text-xl font-bold">👥 Team & Targets</h3>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-D3GjR5G_hL2x9X8zM0W4Q1V6S7N8P9",
            authDomain: "babar-realestate-crm.firebaseapp.com",
            projectId: "babar-realestate-crm",
            storageBucket: "babar-realestate-crm.appspot.com",
            messagingSenderId: "925746578953",
            appId: "1:925746578953:web:3565573a20da750b0d1ad8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Logic
        window.toggleAuth = (mode) => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('forgetForm').classList.add('hidden');
            document.getElementById(mode + 'Form').classList.remove('hidden');
        }

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Auth Actions
        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p)
                .then(() => showPage('dashboardPage'))
                .catch(err => alert("Login Failed: " + err.message));
        }

        window.handleRegister = () => {
            const e = document.getElementById('regEmail').value;
            const p = document.getElementById('regPass').value;
            createUserWithEmailAndPassword(auth, e, p)
                .then(() => { alert("Account Created!"); toggleAuth('login'); })
                .catch(err => alert(err.message));
        }

        window.handleForget = () => {
            const e = document.getElementById('forEmail').value;
            sendPasswordResetEmail(auth, e)
                .then(() => alert("Reset link sent to your Gmail!"))
                .catch(err => alert(err.message));
        }

        window.logout = () => signOut(auth).then(() => showPage('authPage'));

    </script>
</body>
</html>
