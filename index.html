<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .dashboard { width: 90%; max-width: 1000px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #d4af37; padding: 40px 20px; border-radius: 15px; text-align: center; text-decoration: none; color: #fff; transition: 0.3s; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .card:hover { transform: translateY(-10px); background: #d4af37; color: #000; box-shadow: 0 0 30px #d4af37; }
        .card h2 { margin: 0; font-size: 24px; }
        .card p { font-size: 14px; opacity: 0.8; }
        .header { position: absolute; top: 40px; text-align: center; width: 100%; }
        .header h1 { color: #d4af37; letter-spacing: 3px; margin: 0; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BABAR REAL ESTATE CRM</h1>
        <p>Post By Bilal Mughal</p>
    </div>

    <div class="dashboard">
        <a href="leads.html" class="card">
            <h2>➕ Add Leads</h2>
            <p>DHA Lahore, Quetta & Bahawalpur</p>
        </a>

        <a href="dashboard.html" class="card">
            <h2>📊 View Database</h2>
            <p>Check All Saved Leads & Status</p>
        </a>

        <a href="team.html" class="card">
            <h2>👥 Team & Targets</h2>
            <p>Manage Agents & Performance</p>
        </a>
    </div>

</body>
</html>
