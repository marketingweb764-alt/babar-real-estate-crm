    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;

            justify-content: center;

            background: linear-gradient(45deg, #D4AF37, #b8860b) !important;
            color: #000 !important;

        }

        .footer-tag {

            letter-spacing: 1px;
