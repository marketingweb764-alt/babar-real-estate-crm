<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate | CRM Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #000; }
        body { background: var(--black); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        .gold-text { color: var(--gold); }
        .gold-bg { background: linear-gradient(45deg, #d4af37, #f4cf6d); color: #000; }
        .gold-border { border: 1px solid var(--gold); }
        .glass-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 25px; transition: 0.3s; cursor: pointer; }
        .glass-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .page { display: none; padding: 20px; max-width: 800px; margin: auto; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
        input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <div id="loginPage" class="page active mt-20">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold gold-text tracking-widest uppercase">Babar Real Estate</h1>
            <p class="text-[10px] text-gray-500 mt-2">PREMIUM EXECUTIVE ACCESS</p>
        </div>
        <div class="glass-card gold-border max-w-md mx-auto">
            <input type="email" id="loginEmail" placeholder="Gmail Address">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="showPage('dashboardPage')" class="w-full py-4 gold-bg font-bold rounded-xl uppercase">Login to CRM</button>
            <p class="text-[10px] text-center mt-6 text-gray-700 tracking-widest">POST BY BILAL MUGHAL</p>
        </div>
    </div>

    <div id="dashboardPage" class="page">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h2 class="gold-text font-bold uppercase tracking-widest">Master Portal</h2>
            <button onclick="showPage('loginPage')" class="text-xs text-red-500">Logout</button>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div onclick="showPage('leadsPage')" class="glass-card">➕ Add Leads</div>
            <div onclick="showPage('viewLeadsPage')" class="glass-card">📊 View Leads</div>
            <div onclick="showPage('inventoryPage')" class="glass-card">🏠 Inventory</div>
            <div onclick="showPage('accountsPage')" class="glass-card">💰 Accounts</div>
            <div onclick="showPage('calcPage')" class="glass-card">🧮 Calculator</div>
            <div onclick="showPage('teamPage')" class="glass-card">👥 Team</div>
        </div>
    </div>

    <div id="leadsPage" class="page">
        <button onclick="showPage('dashboardPage')" class="mb-4 text-sm gold-text">← Back</button>
        <h2 class="text-xl mb-6 gold-text">Add New Lead</h2>
        <div class="glass-card">
            <input type="text" id="clientName" placeholder="Client Name">
            <input type="text" id="clientPhone" placeholder="Phone Number">
            <select id="propertyInterest">
                <option value="DHA Lahore">DHA Lahore</option>
                <option value="DHA Quetta">DHA Quetta</option>
                <option value="DHA Bahawalpur">DHA Bahawalpur</option>
            </select>
            <button id="saveLeadBtn" class="w-full py-3 gold-bg font-bold rounded-lg">SAVE TO CLOUD</button>
        </div>
    </div>

    <div id="calcPage" class="page">
        <button onclick="showPage('dashboardPage')" class="mb-4 text-sm gold-text">← Back</button>
        <h2 class="text-xl mb-6 gold-text">Installment Calculator</h2>
        <div class="glass-card">
            <input type="number" id="totalPrice" placeholder="Total Price">
            <input type="number" id="downPayment" placeholder="Down Payment">
            <input type="number" id="months" placeholder="Months">
            <button onclick="calculatePlan()" class="w-full py-3 gold-bg font-bold rounded-lg">CALCULATE</button>
            <div id="calcResult" class="mt-4 p-4 bg-white text-black rounded-lg hidden">
                <p>Monthly: <b id="resMonthly">0</b></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config (Bilal bhai, ye wahi keys hain jo ap ne di thin)
        const firebaseConfig = {
            apiKey: "AIzaSyB-D3GjR5G_hL2x9X8zM0W4Q1V6S7N8P9",
            authDomain: "babar-realestate-crm.firebaseapp.com",
            projectId: "babar-realestate-crm",
            storageBucket: "babar-realestate-crm.appspot.com",
            messagingSenderId: "925746578953",
            appId: "1:925746578953:web:3565573a20da750b0d1ad8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Page Switcher Function
        window.showPage = function(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        // Save Lead Logic
        document.getElementById('saveLeadBtn').addEventListener('click', async () => {
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const property = document.getElementById('propertyInterest').value;

            if(!name || !phone) return alert("Pehle details likhen!");

            try {
                await addDoc(collection(db, "leads"), {
                    name, phone, property, timestamp: serverTimestamp()
                });
                alert("🎉 Mubarak! Data Cloud par save ho gaya.");
                showPage('dashboardPage');
            } catch (e) { alert("Error: Data save nahi hua."); }
        });

        // Calculator Logic
        window.calculatePlan = function() {
            const total = document.getElementById('totalPrice').value;
            const down = document.getElementById('downPayment').value;
            const m = document.getElementById('months').value;
            const monthly = (total - down) / m;
            document.getElementById('resMonthly').innerText = "Rs. " + Math.round(monthly).toLocaleString();
            document.getElementById('calcResult').classList.remove('hidden');
        }
    </script>
</body>
</html>
