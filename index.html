<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate CRM</title>
    <style>
        body { 
            background: #000; 
            color: #D4AF37; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px; 
            margin: 0;
        }
        .container { 
            border: 2px solid #D4AF37; 
            padding: 40px; 
            border-radius: 20px; 
            display: inline-block; 
            background: #111;
            box-shadow: 0px 0px 20px rgba(212, 175, 55, 0.2);
        }
        h1 { 
            letter-spacing: 4px; 
            font-size: 36px;
            margin-bottom: 10px;
        }
        p { color: #fff; opacity: 0.8; margin-bottom: 30px; }
        .btn { 
            background: #D4AF37; 
            color: #000; 
            padding: 15px 40px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 8px; 
            display: block; 
            margin: 15px auto;
            width: 200px;
            transition: 0.3s;
        }
        .btn:hover { 
            background: #fff; 
            transform: scale(1.05);
        }
        .secondary { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BABAR REAL ESTATE</h1>
        <p>End-Level Property Management & CRM</p>
        
        <a href="#" class="btn">ADMIN DASHBOARD</a>
        <a href="#" class="btn secondary">AGENT PORTAL</a>
        <a href="#" class="btn" style="background: #25D366; color: white;">WHATSAPP LEADS</a>
    </div>
</body>
</html>
