<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Management - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 18px; margin: 0; text-transform: uppercase; }
        .back-btn { color: #fff; text-decoration: none; font-size: 12px; border: 1px solid #333; padding: 8px 15px; border-radius: 8px; background: #111; }

        .admin-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .add-btn { background: #D4AF37; color: #000; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .team-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .member-card { background: #111; padding: 20px; border-radius: 15px; border-left: 5px solid #D4AF37; }
        .member-card h3 { margin: 0; color: #D4AF37; font-size: 18px; }
        .target-box { background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px dashed #444; }
        .target-box p { margin: 0; font-size: 13px; color: #aaa; }
    </style>
</head>
<body>

<div class="header">
    <h1>Team & Targets</h1>
    <a href="index.html" class="back-btn">← Back</a>
</div>

<div class="admin-box">
    <input type="text" id="mName" placeholder="Member Name (e.g. Ali Raza)">
    <input type="text" id="mRole" placeholder="Designation (e.g. Sales Manager)">
    <textarea id="mTarget" placeholder="Assign Daily Target (e.g. Complete 20 calls and 2 site visits)"></textarea>
    <button class="add-btn" onclick="addMember()">Add Member & Assign Target</button>
</div>

<div id="teamList" class="team-grid"></div>

<script>
    window.onload = displayTeam;

    function addMember() {
        const name = document.getElementById('mName').value;
        const role = document.getElementById('mRole').value;
        const target = document.getElementById('mTarget').value;

        if(!name || !target) return alert("Member name aur target lazmi hai!");

        let team = JSON.parse(localStorage.getItem('babar_team')) || [];
        team.unshift({ id: Date.now(), name, role, target });
        localStorage.setItem('babar_team', JSON.stringify(team));
        
        document.getElementById('mName').value = '';
        document.getElementById('mRole').value = '';
        document.getElementById('mTarget').value = '';
        displayTeam();
    }

    function displayTeam() {
        const team = JSON.parse(localStorage.getItem('babar_team')) || [];
        const container = document.getElementById('teamList');
        
        container.innerHTML = team.map(m => `
            <div class="member-card">
                <h3>${m.name}</h3>
                <p style="font-size:12px; color:#666;">${m.role}</p>
                <div class="target-box">
                    <p><strong>🎯 Today's Target:</strong><br>${m.target}</p>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#444;">No team members added.</p>';
    }
</script>
</body>
</html>
