<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 18px; text-transform: uppercase; margin: 0; }
        .back-btn { color: #fff; text-decoration: none; font-size: 12px; border: 1px solid #333; padding: 8px 15px; border-radius: 8px; background: #111; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .stat-card.income { border-bottom: 4px solid #2ecc71; }
        .stat-card.expense { border-bottom: 4px solid #e74c3c; }
        .stat-card h2 { margin: 0; font-size: 12px; color: #888; text-transform: uppercase; }
        .stat-card .amount { font-size: 18px; font-weight: bold; margin-top: 10px; color: #D4AF37; }

        /* Form Styling */
        .form-container { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .submit-btn { background: #D4AF37; color: #000; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Transaction List */
        .transaction-card { background: #161616; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .trans-income { border-left-color: #2ecc71; }
        .trans-expense { border-left-color: #e74c3c; }
        .trans-info h4 { margin: 0; font-size: 14px; color: #D4AF37; }
        .trans-info span { font-size: 10px; color: #555; }
        .trans-amount { font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Accounts Dashboard</h1>
    <a href="index.html" class="back-btn">← Home</a>
</div>

<div class="stats-grid">
    <div class="stat-card income">
        <h2>Total Income</h2>
        <div class="amount" id="totalIncome">Rs. 0</div>
    </div>
    <div class="stat-card expense">
        <h2>Total Expense</h2>
        <div class="amount" id="totalExpense">Rs. 0</div>
    </div>
</div>

<div class="form-container">
    <select id="tType">
        <option value="income">💰 Income (Deal Commission, etc.)</option>
        <option value="expense">💸 Expense (Rent, Salary, Grocery)</option>
    </select>
    <input type="text" id="tTitle" placeholder="Description (e.g. Office Rent, Salary)">
    <input type="number" id="tAmount" placeholder="Amount (PKR)">
    <button class="submit-btn" onclick="addTransaction()">Add Entry</button>
</div>

<div id="transactionsList"></div>

<script>
    window.onload = displayTransactions;

    function addTransaction() {
        const type = document.getElementById('tType').value;
        const title = document.getElementById('tTitle').value;
        const amount = document.getElementById('tAmount').value;
        
        if(!title || !amount) return alert("Details poori likhen!");

        let trans = JSON.parse(localStorage.getItem('babar_accounts')) || [];
        trans.unshift({
            id: Date.now(),
            type,
            title,
            amount: parseFloat(amount),
            date: new Date().toLocaleDateString()
        });

        localStorage.setItem('babar_accounts', JSON.stringify(trans));
        document.getElementById('tTitle').value = '';
        document.getElementById('tAmount').value = '';
        displayTransactions();
    }

    function displayTransactions() {
        const trans = JSON.parse(localStorage.getItem('babar_accounts')) || [];
        const listContainer = document.getElementById('transactionsList');
        
        let income = 0;
        let expense = 0;

        listContainer.innerHTML = trans.map(t => {
            if(t.type === 'income') income += t.amount;
            else expense += t.amount;

            return `
                <div class="transaction-card trans-${t.type}">
                    <div class="trans-info">
                        <h4>${t.title}</h4>
                        <span>📅 ${t.date}</span>
                    </div>
                    <div class="trans-amount" style="color: ${t.type === 'income' ? '#2ecc71' : '#e74c3c'}">
                        ${t.type === 'income' ? '+' : '-'} Rs. ${t.amount.toLocaleString()}
                    </div>
                </div>
            `;
        }).join('') || '<p style="text-align:center; color:#444;">No records found.</p>';

        document.getElementById('totalIncome').innerText = `Rs. ${income.toLocaleString()}`;
        document.getElementById('totalExpense').innerText = `Rs. ${expense.toLocaleString()}`;
    }
</script>
</body>
</html>
