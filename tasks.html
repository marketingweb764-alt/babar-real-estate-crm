<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 18px; margin: 0; text-transform: uppercase; }
        .back-btn { color: #fff; text-decoration: none; font-size: 12px; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; }

        .admin-box { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #D4AF37; margin-bottom: 25px; display: none; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .add-btn { background: #D4AF37; color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .task-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #D4AF37; position: relative; }
        .task-card h3 { margin: 0; font-size: 16px; color: #D4AF37; }
        .task-card p { margin: 5px 0; font-size: 13px; color: #888; }
        .assign-tag { font-size: 10px; background: #333; color: #D4AF37; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        .task-status { position: absolute; top: 15px; right: 15px; font-size: 10px; color: #27ae60; border: 1px solid #27ae60; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Team Tasks</h1>
    <a href="index.html" class="back-btn">← Home</a>
</div>

<div class="admin-box" id="taskAdmin">
    <h2 style="font-size: 14px; margin-bottom: 15px; color: #888;">Assign New Task</h2>
    <select id="assignTo"></select>
    <input type="text" id="taskTitle" placeholder="Task Title (e.g. Call Client)">
    <textarea id="taskDesc" placeholder="Task Details..."></textarea>
    <button class="add-btn" onclick="addTask()">ASSIGN TASK</button>
</div>

<div id="taskList"></div>

<script>
    const userRole = sessionStorage.getItem('userRole');
    const currentUserName = sessionStorage.getItem('userName');

    window.onload = function() {
        if(userRole === 'CEO') {
            document.getElementById('taskAdmin').style.display = 'block';
            populateMembers();
        }
        displayTasks();
    }

    function populateMembers() {
        const users = JSON.parse(localStorage.getItem('crm_users')) || [];
        const select = document.getElementById('assignTo');
        select.innerHTML = users.map(u => `<option value="${u.name}">${u.name}</option>`).join('') || '<option>No members found</option>';
    }

    function addTask() {
        const title = document.getElementById('taskTitle').value;
        const desc = document.getElementById('taskDesc').value;
        const to = document.getElementById('assignTo').value;
        if(!title) return;

        let tasks = JSON.parse(localStorage.getItem('babar_tasks')) || [];
        tasks.unshift({ title, desc, to, date: new Date().toLocaleDateString(), status: 'Pending' });
        localStorage.setItem('babar_tasks', JSON.stringify(tasks));
        displayTasks();
    }

    function displayTasks() {
        let tasks = JSON.parse(localStorage.getItem('babar_tasks')) || [];
        const container = document.getElementById('taskList');
        
        // Filter for members
        if(userRole !== 'CEO') {
            tasks = tasks.filter(t => t.to === currentUserName);
        }

        container.innerHTML = tasks.map(t => `
            <div class="task-card">
                <span class="task-status">${t.status}</span>
                <h3>${t.title}</h3>
                <p>${t.desc}</p>
                <span class="assign-tag">To: ${t.to} | ${t.date}</span>
            </div>
        `).join('') || '<p style="text-align:center; color:#444;">No tasks found.</p>';
    }
</script>
</body>
</html>
