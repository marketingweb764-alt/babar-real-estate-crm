<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Inventory - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; text-align: center; }
        h1 { color: #D4AF37; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .sub-text { color: #888; margin-bottom: 30px; font-size: 14px; }
        
        .table-wrapper { background: #111; border: 1px solid #333; border-radius: 12px; overflow-x: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 600px; }
        th { background: #D4AF37; color: #000; padding: 18px; font-size: 14px; text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid #222; font-size: 15px; color: #ddd; }
        tr:hover { background: #1a1a1a; transition: 0.2s; }
        
        .price { color: #2ecc71; font-weight: bold; }
        .location { color: #aaa; font-size: 13px; }
        
        .btn { background: #D4AF37; color: #000; padding: 8px 16px; text-decoration: none; font-weight: bold; border-radius: 4px; font-size: 12px; transition: 0.3s; display: inline-block; }
        .btn:hover { background: #fff; transform: translateY(-2px); }
        
        #loader { padding: 60px; color: #D4AF37; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Babar Real Estate</h1>
    <p class="sub-text">Live Property Inventory (25+ Listings)</p>

    <div id="loader">📡 Loading Live Inventory...</div>

    <div class="table-wrapper" id="contentBox" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Property Details</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryList"></tbody>
        </table>
    </div>
</div>

<script>
    // FIXED LINK: Small 'l' ke sath
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_lsiGLyJcp-uZpYNdQRIanSmTphxpqPZN9FcUwcQrLh5HVYGPbSEFe3xCljueEgilCrjjdHOXMnaU/pub?output=csv';

    async function loadAllData() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            
            // CSV parsing
            const rows = data.split('\n');
            const list = document.getElementById('inventoryList');
            list.innerHTML = '';

            // 1st row (Header) chor kar sari (25+) rows uthana
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (cols.length >= 3 && cols[0].trim() !== "") {
                    const title = cols[0].replace(/"/g, '').trim();
                    const loc = cols[1].replace(/"/g, '').trim();
                    const price = cols[2].replace(/"/g, '').trim();

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${title}</strong></td>
                        <td class="location">${loc}</td>
                        <td class="price">${price}</td>
                        <td>
                            <a href="ad-details.html?title=${encodeURIComponent(title)}&price=${encodeURIComponent(price)}&location=${encodeURIComponent(loc)}" class="btn">VIEW AD</a>
                        </td>
                    `;
                    list.appendChild(tr);
                }
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('contentBox').style.display = 'block';

        } catch (e) {
            document.getElementById('loader').innerText = "❌ Database Connection Error. Please refresh.";
            console.error(e);
        }
    }

    window.onload = loadAllData;
</script>

</body>
</html>
