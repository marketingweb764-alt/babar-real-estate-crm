<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate - Inventory</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 30px; border-bottom: 2px solid #D4AF37; margin-bottom: 30px; }
        h1 { color: #D4AF37; margin: 0; letter-spacing: 2px; }
        .search-box { text-align: center; margin-bottom: 30px; }
        input { padding: 12px; width: 300px; border-radius: 5px; border: 1px solid #D4AF37; background: #111; color: #fff; }
        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 10px; overflow: hidden; }
        th { background: #D4AF37; color: #000; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #333; }
        tr:hover { background: #1a1a1a; }
        .view-btn { background: #D4AF37; color: #000; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 12px; }
        .view-btn:hover { background: #fff; }
        .loading { text-align: center; font-size: 20px; color: #D4AF37; padding: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1>INVENTORY DASHBOARD</h1>
    <p>Babar Real Estate Premium Listings</p>
</div>

<div class="search-box">
    <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Search by Location or Title...">
</div>

<div id="loading" class="loading">Fetching Live Data from Google Sheets...</div>

<table id="inventoryTable" style="display:none;">
    <thead>
        <tr>
            <th>Property Title</th>
            <th>Location</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        </tbody>
</table>

<script>
    // Apni Google Sheet ka URL yahan check karein
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1vCis97Y553oE9p4PAn18i64-p-yYhFqYpEOfL29O-H8/gviz/tq?tqx=out:json';

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;
            
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            rows.forEach(row => {
                const title = row.c[0] ? row.c[0].v : 'N/A';
                const location = row.c[1] ? row.c[1].v : 'N/A';
                const price = row.c[2] ? row.c[2].v : 'N/A';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${title}</td>
                    <td>${location}</td>
                    <td><strong>${price}</strong></td>
                    <td>
                        <a href="ad-details.html?title=${encodeURIComponent(title)}&price=${encodeURIComponent(price)}&location=${encodeURIComponent(location)}" class="view-btn">VIEW AD</a>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('inventoryTable').style.display = 'table';

        } catch (error) {
            document.getElementById('loading').innerHTML = "Error loading data. Please check connection.";
            console.error(error);
        }
    }

    function searchTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let tr = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < tr.length; i++) {
            let tdTitle = tr[i].getElementsByTagName("td")[0];
            let tdLoc = tr[i].getElementsByTagName("td")[1];
            if (tdTitle || tdLoc) {
                let textValue = (tdTitle.textContent || tdTitle.innerText) + (tdLoc.textContent || tdLoc.innerText);
                tr[i].style.display = textValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
