<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard - Babar Real Estate</title>
    <style>
        /* Premium Dark Theme */
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; text-align: center; }
        h1 { color: #D4AF37; font-size: 32px; text-transform: uppercase; letter-spacing: 3px; margin-top: 40px; }
        p.subtitle { color: #888; margin-bottom: 40px; }

        /* Table Styling */
        .table-wrapper { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; overflow-x: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        th { background: #D4AF37; color: #000; padding: 20px; font-size: 14px; text-transform: uppercase; font-weight: 800; }
        td { padding: 18px; border-bottom: 1px solid #1a1a1a; font-size: 15px; color: #eee; }
        tr:hover { background: #111; transition: 0.3s; }

        /* Data Colors */
        .price-text { color: #2ecc71; font-weight: bold; }
        .location-text { color: #aaa; font-style: italic; }

        /* Button Style */
        .view-btn { background: #D4AF37; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; font-size: 12px; transition: 0.3s; display: inline-block; text-transform: uppercase; }
        .view-btn:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        /* Loading Animation */
        #loader { padding: 80px; color: #D4AF37; font-size: 20px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Inventory Dashboard</h1>
    <p class="subtitle">Live Property Database - Babar Real Estate Official</p>

    <div id="loader">📡 Fetching 26+ Property Listings...</div>

    <div class="table-wrapper" id="contentBox" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Property Details</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryList">
                </tbody>
        </table>
    </div>
</div>

<script>
    // FIXED GOOGLE SHEET LINK
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_lsiGLyJcp-uZpYNdQRIanSmTphxpqPZN9FcUwcQrLh5HVYGPbSEFe3xCljueEgilCrjjdHOXMnaU/pub?output=csv';

    async function loadInventory() {
        try {
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            
            const rows = csvData.split('\n');
            const list = document.getElementById('inventoryList');
            list.innerHTML = '';

            // Process all rows except header (i=1)
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (cols.length >= 3 && cols[0].trim() !== "") {
                    const title = cols[0].replace(/"/g, '').trim();
                    const location = cols[1].replace(/"/g, '').trim();
                    const price = cols[2].replace(/"/g, '').trim();

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${title}</strong></td>
                        <td class="location-text">${location}</td>
                        <td class="price-text">${price}</td>
                        <td>
                            <a href="ad-details.html?title=${encodeURIComponent(title)}&price=${encodeURIComponent(price)}&location=${encodeURIComponent(location)}" class="view-btn">View Full Ad</a>
                        </td>
                    `;
                    list.appendChild(tr);
                }
            }

            // Hide loader and show table
            document.getElementById('loader').style.display = 'none';
            document.getElementById('contentBox').style.display = 'block';

        } catch (error) {
            document.getElementById('loader').innerHTML = "❌ Connection Failed. Check if Sheet is 'Published to Web'.";
            console.error(error);
        }
    }

    // Start fetching on page load
    window.onload = loadInventory;
</script>

</body>
</html>
