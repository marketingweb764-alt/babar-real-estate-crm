<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #D4AF37; margin-top: 30px; letter-spacing: 2px; text-transform: uppercase; }
        .sub-title { color: #888; font-size: 14px; margin-bottom: 30px; }
        .table-container { max-width: 1100px; margin: auto; background: #0a0a0a; border: 1px solid #333; border-radius: 12px; overflow-x: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        th { background: #D4AF37; color: #000; padding: 18px; font-size: 14px; text-transform: uppercase; font-weight: bold; }
        td { padding: 16px; border-bottom: 1px solid #1a1a1a; font-size: 15px; color: #eee; }
        tr:hover { background: #111; transition: 0.2s; }
        .price-col { color: #2ecc71; font-weight: bold; }
        .view-btn { background: #D4AF37; color: #000; padding: 8px 16px; text-decoration: none; font-weight: bold; border-radius: 4px; font-size: 12px; transition: 0.3s; display: inline-block; }
        .view-btn:hover { background: #fff; transform: translateY(-2px); }
        #loader { padding: 80px; color: #D4AF37; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>BABAR REAL ESTATE</h1>
    <p class="sub-title">Live Property Inventory (25+ Listings)</p>

    <div id="loader">📡 Connecting to Database...</div>

    <div class="table-container" id="mainBox" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Property Details</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryList"></tbody>
        </table>
    </div>

    <script>
        // PROXY USE KIYA HAI TAAKE CONNECTION ERROR NA AAYE
        const sheetID = '2PACX-1vT_lsiGLyJcp-uZpYNdQRIanSmTphxpqPZN9FcUwcQrLh5HVYGPbSEFe3xCljueEgilCrjjdHOXMnaU';
        const csvUrl = `https://cors-anywhere.herokuapp.com/https://docs.google.com/spreadsheets/d/e/${sheetID}/pub?output=csv`;
        
        // Backup direct link agar proxy slow ho
        const directUrl = `https://docs.google.com/spreadsheets/d/e/${sheetID}/pub?output=csv`;

        async function fetchInventory() {
            try {
                // Pehle direct try karein, agar fail ho toh proxy se
                let response = await fetch(directUrl).catch(() => fetch(csvUrl));
                
                if (!response.ok) throw new Error('Data fetch failed');
                
                const csvData = await response.text();
                const rows = csvData.split('\n');
                const tbody = document.getElementById('inventoryList');
                tbody.innerHTML = '';

                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length >= 3 && columns[0].trim() !== "") {
                        const title = columns[0].replace(/"/g, '').trim();
                        const loc = columns[1].replace(/"/g, '').trim();
                        const price = columns[2].replace(/"/g, '').trim();

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${title}</strong></td>
                            <td>${loc}</td>
                            <td class="price-col">${price}</td>
                            <td>
                                <a href="ad-details.html?title=${encodeURIComponent(title)}&price=${encodeURIComponent(price)}&location=${encodeURIComponent(loc)}" class="view-btn">VIEW DETAILS</a>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    }
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('mainBox').style.display = 'block';

            } catch (err) {
                document.getElementById('loader').innerHTML = "❌ Connection Refused. Please refresh or check if Sheet is 'Published to Web'.";
            }
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
