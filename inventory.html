<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate - CRM Portal</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Header */
        header { background: #111; padding: 40px 20px; text-align: center; border-bottom: 2px solid #D4AF37; }
        header h1 { color: #D4AF37; margin: 0; letter-spacing: 3px; font-size: 26px; text-transform: uppercase; }
        header p { color: #888; font-size: 13px; margin-top: 5px; }
        
        /* Stats Bar */
        .stats-bar { 
            background: #D4AF37; 
            color: #000; 
            margin: 20px; 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-around; 
            font-weight: bold;
            text-align: center;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .stats-bar small { display: block; font-size: 10px; text-transform: uppercase; opacity: 0.8; }

        /* Grid Menu */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 10px 20px 40px; 
            max-width: 800px; 
            margin: auto; 
        }
        
        .card { 
            background: #111; 
            border: 1px solid #333; 
            padding: 30px 15px; 
            border-radius: 15px; 
            text-align: center; 
            text-decoration: none; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .card:hover { border-color: #D4AF37; background: #1a1a1a; transform: translateY(-5px); }
        
        /* Icons (Emoji replacement for now) */
        .icon { font-size: 32px; margin-bottom: 12px; }
        
        .card h3 { color: #D4AF37; margin: 5px 0; font-size: 16px; text-transform: uppercase; }
        .card p { color: #666; font-size: 11px; margin: 0; }

        /* Footer Info */
        .footer-note { text-align: center; color: #444; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <h1>BABAR REAL ESTATE</h1>
    <p>Official CRM Control Panel</p>
</header>

<div class="stats-bar">
    <div><small>Active Listings</small>25+</div>
    <div><small>Today's Leads</small>0</div>
    <div><small>Server Status</small>Online</div>
</div>

<div class="grid-container">
    <a href="inventory.html" class="card">
        <div class="icon">🏠</div>
        <h3>Inventory</h3>
        <p>Live Property Database</p>
    </a>
    
    <a href="leads.html" class="card">
        <div class="icon">👥</div>
        <h3>Client Leads</h3>
        <p>Manage New Inquiries</p>
    </a>
    
    <a href="calculator.html" class="card">
        <div class="icon">🧮</div>
        <h3>Calculator</h3>
        <p>Installment Plans</p>
    </a>
    
    <a href="tasks.html" class="card">
        <div class="icon">📅</div>
        <h3>Tasks</h3>
        <p>Meetings & Follow-ups</p>
    </a>
</div>

<div class="footer-note">
    Design & Developed By Bilal Mughal Official
</div>

</body>
</html>
