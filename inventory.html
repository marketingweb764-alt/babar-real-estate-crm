<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Inventory - Babar Real Estate</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; }
        .search-box { width: 100%; max-width: 600px; padding: 15px; margin: 20px auto; display: block; border-radius: 10px; border: 1px solid #D4AF37; background: #111; color: #fff; font-size: 18px; }
        .inventory-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #D4AF37; color: #000; text-transform: uppercase; }
        tr:hover { background: #222; cursor: pointer; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; background: #28a745; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <h1>BABAR REAL ESTATE</h1>
    <p>Live Property Inventory (240+ Ads)</p>
</div>

<input type="text" id="searchInput" class="search-box" placeholder="Search by Phase, Price, or Title (e.g. DHA Phase 6)..." onkeyup="filterTable()">

<table class="inventory-table" id="adTable">
    <thead>
        <tr>
            <th>Property Title</th>
            <th>Location</th>
            <th>Price</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        <tr><td colspan="5" style="text-align:center;">Loading Ads from Database...</td></tr>
    </tbody>
</table>

<script>
    // Aapki Google Sheet ki ID
    const sheetId = '1nAqg9ku1ZGDV5BbBCtpWupRSjQHMis4pKB5RSbCyxJY';
    
    // Yahan hum sirf un tabs ke naam likhenge jahan ads hain
    // Aapki sheet ke hisab se main ne generic loop lagaya hai
    async function loadInventory() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ""; // Clear loading text

        try {
            // Note: Asli connection ke liye humein Google Sheets API ya CSV export link chahiye hota hai
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
            
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;

            rows.forEach((row, index) => {
                // Team wale tab ko ignore karne ke liye hum check laga sakte hain
                if(index > 0) { // First row headers hoti hain
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.c[0] ? row.c[0].v : 'N/A'}</td>
                        <td>${row.c[1] ? row.c[1].v : 'DHA Lahore'}</td>
                        <td>${row.c[2] ? row.c[2].v : 'Contact for Price'}</td>
                        <td><span class="status-badge">Available</span></td>
                        <td><button style="background:#D4AF37; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">View Ad</button></td>
                    `;
                    tableBody.appendChild(tr);
                }
            });
        } catch (error) {
            console.error("Error loading sheet:", error);
            tableBody.innerHTML = "<tr><td colspan='5'>Error connecting to Sheet. Make sure it's shared as 'Anyone with link'.</td></tr>";
        }
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let table = document.getElementById("adTable");
        let tr = table.getElementsByTagName("tr");
        for (let i = 1; i < tr.length; i++) {
            tr[i].style.display = tr[i].innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }

    window.onload = loadInventory;
</script>

</body>
</html>
