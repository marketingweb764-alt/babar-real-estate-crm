<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate - Inventory</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #D4AF37; margin-top: 30px; letter-spacing: 2px; }
        .table-container { max-width: 1000px; margin: 40px auto; overflow-x: auto; border: 1px solid #333; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; background: #111; }
        th { background: #D4AF37; color: #000; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #222; text-align: left; }
        .view-btn { background: #D4AF37; color: #000; padding: 8px 15px; text-decoration: none; font-weight: bold; border-radius: 4px; font-size: 12px; }
        #status { padding: 50px; color: #D4AF37; font-weight: bold; }
    </style>
</head>
<body>

    <h1>BABAR REAL ESTATE</h1>
    <p>Live Property Inventory Management</p>

    <div id="status">📡 Fetching Live Ads...</div>

    <div class="table-container" id="tableBox" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Property Title</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

    <script>
        // Aapka naya Published Link jo screenshot se liya gaya hai
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_lsiGLyJcp-uZpYNdQRIanSmTphxpqPZN9FcUwcQrLh5HVYGPbSEFe3xCljueEgilCrjjdHOXMnaU/pub?output=csv';

        async function fetchAds() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // Header row nikalne ke liye
                
                const tbody = document.getElementById('inventoryBody');
                
                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length >= 3 && columns[0].trim() !== "") {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${columns[0].replace(/"/g, '')}</td>
                            <td>${columns[1].replace(/"/g, '')}</td>
                            <td style="color: #2ecc71; font-weight: bold;">${columns[2].replace(/"/g, '')}</td>
                            <td>
                                <a href="ad-details.html?title=${encodeURIComponent(columns[0])}&price=${encodeURIComponent(columns[2])}&location=${encodeURIComponent(columns[1])}" class="view-btn">VIEW AD</a>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    }
                });

                document.getElementById('status').style.display = 'none';
                document.getElementById('tableBox').style.display = 'block';

            } catch (err) {
                document.getElementById('status').innerText = "❌ Data load nahi ho raha. Link check karein.";
            }
        }

        window.onload = fetchAds;
    </script>
</body>
</html>
