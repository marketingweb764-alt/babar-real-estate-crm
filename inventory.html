<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard - Babar Real Estate</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; }
        .search-box { width: 100%; max-width: 600px; padding: 15px; margin: 20px auto; display: block; border-radius: 10px; border: 1px solid #D4AF37; background: #111; color: #fff; font-size: 18px; }
        .inventory-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #D4AF37; color: #000; text-transform: uppercase; }
        tr:hover { background: #222; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; background: #28a745; color: #fff; }
        .btn-view { background: #D4AF37; color: #000; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .btn-view:hover { background: #fff; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="letter-spacing: 2px;">BABAR REAL ESTATE</h1>
    <p>Live Property Inventory (All 26 Pages)</p>
</div>

<input type="text" id="searchInput" class="search-box" placeholder="Search by Phase, Price, or Title..." onkeyup="filterTable()">

<table class="inventory-table" id="adTable">
    <thead>
        <tr>
            <th>Property Title</th>
            <th>Location</th>
            <th>Price</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        <tr><td colspan="5" style="text-align:center; padding: 50px;">Fetching all ads from Google Sheets... Please wait.</td></tr>
    </tbody>
</table>

<script>
    // Aapka Apps Script Web App URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyG2TklQ64A8HHh1f9hOSESfJqpNH0z7Q9m0m4RxlapIIM_m5fBTnMlvfnjp5nP_ZRlQ/exec';

    async function loadInventory() {
        const tableBody = document.getElementById('tableBody');

        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            tableBody.innerHTML = ""; // Purana loading message hatayein

            if (data.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No ads found in the sheets.</td></tr>";
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.title || 'N/A'}</td>
                    <td>${item.location || 'DHA Lahore'}</td>
                    <td>${item.price || 'Contact for Price'}</td>
                    <td><span class="status-badge">Available</span></td>
                    <td><a href="${item.link}" target="_blank" class="btn-view">VIEW AD</a></td>
                `;
                tableBody.appendChild(tr);
            });
        } catch (error) {
            console.error("Error loading ads:", error);
            tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center; color: red;'>Connection Error: Make sure Apps Script is deployed as 'Anyone'.</td></tr>";
        }
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let table = document.getElementById("adTable");
        let tr = table.getElementsByTagName("tr");
        for (let i = 1; i < tr.length; i++) {
            tr[i].style.display = tr[i].innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }

    // Page load hote hi data fetch karein
    window.onload = loadInventory;
</script>

</body>
</html>
