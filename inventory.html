<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #D4AF37; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        .container { max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        th { background: #D4AF37; color: #000; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #222; text-align: left; font-size: 15px; }
        tr:hover { background: #1a1a1a; }
        .view-btn { background: #D4AF37; color: #000; padding: 8px 15px; text-decoration: none; font-weight: bold; border-radius: 4px; font-size: 12px; transition: 0.3s; display: inline-block; }
        .view-btn:hover { background: #fff; transform: scale(1.05); }
        #loading { padding: 50px; color: #D4AF37; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Inventory Dashboard</h1>
        <div id="loading">📡 Live Data Fetching...</div>
        
        <table id="inventoryTable" style="display:none;">
            <thead>
                <tr>
                    <th>Property Details</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        // Aapka naya Published Link (CSV format mein conversion ke saath)
        const publishedUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_lsiGLyJcp-uZpYNdQRIanSmTphxpqPZN9FcUwcQrLh5HVYGPbSEFe3xCljueEgilCrjjdHOXMnaU/pub?output=csv';

        async function fetchInventory() {
            try {
                const response = await fetch(publishedUrl);
                const csvData = await response.text();
                
                // CSV ko rows mein convert karna
                const rows = csvData.split('\n').map(row => row.split(','));
                const tableBody = document.getElementById('tableBody');
                
                // Pehli row (Header) ko chor kar data process karna
                for (let i = 1; i < rows.length; i++) {
                    const [title, location, price] = rows[i];
                    
                    if (title && title.trim() !== "") {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${title.replace(/"/g, '')}</strong></td>
                            <td>${location ? location.replace(/"/g, '') : '-'}</td>
                            <td style="color: #2ecc71; font-weight: bold;">${price ? price.replace(/"/g, '') : '-'}</td>
                            <td>
                                <a href="ad-details.html?title=${encodeURIComponent(title)}&price=${encodeURIComponent(price)}&location=${encodeURIComponent(location)}" class="view-btn">VIEW AD</a>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    }
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('inventoryTable').style.display = 'table';
                
            } catch (error) {
                document.getElementById('loading').innerHTML = "❌ Connection Error. Please refresh.";
                console.error("Fetch error:", error);
            }
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
