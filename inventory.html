<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 20px; margin: 0; text-transform: uppercase; }
        .back-btn { color: #fff; text-decoration: none; font-size: 12px; border: 1px solid #333; padding: 8px 15px; border-radius: 8px; background: #111; }

        #searchInput { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; outline: none; margin-bottom: 20px; box-sizing: border-box; }

        .admin-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #D4AF37; margin-bottom: 30px; display: none; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .add-btn { background: #D4AF37; color: #000; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background: #111; border-radius: 18px; padding: 20px; border: 1px solid #222; position: relative; }
        .status-badge { position: absolute; top: 20px; right: 20px; padding: 5px 12px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .available { background: rgba(39, 174, 96, 0.1); color: #2ecc71; border: 1px solid #2ecc71; }
        .sold { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }

        .card h3 { margin: 0; color: #D4AF37; font-size: 18px; }
        .price-tag { font-size: 20px; color: #fff; font-weight: bold; margin: 15px 0; display: block; }
        
        .card-actions { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #222; padding-top: 15px; }
        .btn-wa { background: #25D366; color: #fff; border: none; padding: 12px; border-radius: 8px; flex: 2; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; text-transform: uppercase; }
        .btn-status { background: #333; color: #fff; border: none; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Inventory</h1>
    <a href="index.html" class="back-btn">← Back</a>
</div>

<input type="text" id="searchInput" onkeyup="searchPlots()" placeholder="Search Plot, Sector, Price...">

<div class="admin-box" id="adminBox">
    <input type="text" id="pTitle" placeholder="Plot No / Name">
    <input type="text" id="pSector" placeholder="Location / Sector">
    <input type="text" id="pPrice" placeholder="Price (e.g. 3.5 Crore)">
    <textarea id="pDesc" placeholder="Details (Facing park, Corner, etc.)"></textarea>
    <button class="add-btn" onclick="addPlot()">Add to Inventory</button>
</div>

<div id="inventoryList" class="grid"></div>

<script>
    const userRole = sessionStorage.getItem('userRole');

    window.onload = function() {
        if(userRole === 'CEO') document.getElementById('adminBox').style.display = 'block';
        displayInventory();
    }

    function addPlot() {
        const title = document.getElementById('pTitle').value;
        const sector = document.getElementById('pSector').value;
        const price = document.getElementById('pPrice').value;
        const desc = document.getElementById('pDesc').value;

        if(!title || !price) return alert("Fill Plot No and Price!");

        let inventory = JSON.parse(localStorage.getItem('babar_inventory')) || [];
        inventory.unshift({ id: Date.now(), title, sector, price, desc, status: 'Available' });
        localStorage.setItem('babar_inventory', JSON.stringify(inventory));
        
        document.getElementById('pTitle').value = '';
        document.getElementById('pSector').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pDesc').value = '';
        displayInventory();
    }

    function displayInventory() {
        const inventory = JSON.parse(localStorage.getItem('babar_inventory')) || [];
        const container = document.getElementById('inventoryList');
        
        container.innerHTML = inventory.map(p => `
            <div class="card inventory-card">
                <span class="status-badge ${p.status.toLowerCase()}">${p.status}</span>
                <h3>${p.title}</h3>
                <p>📍 ${p.sector}</p>
                <span class="price-tag">Rs. ${p.price}</span>
                <p style="font-size: 12px; color: #888;">${p.desc}</p>
                
                <div class="card-actions">
                    <button class="btn-wa" onclick="shareWA('${p.id}')">📲 SHARE ON WHATSAPP</button>
                    ${userRole === 'CEO' ? `
                        <button class="btn-status" onclick="toggleStatus(${p.id})">Sold/Avail</button>
                    ` : ''}
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#444;">Inventory empty.</p>';
    }

    function shareWA(id) {
        const inv = JSON.parse(localStorage.getItem('babar_inventory'));
        const p = inv.find(x => x.id == id);
        const text = `*BABAR REAL ESTATE*%0A%0A🏠 *Plot:* ${p.title}%0A📍 *Location:* ${p.sector}%0A💰 *Price:* Rs. ${p.price}%0A📊 *Status:* ${p.status}%0A📝 *Details:* ${p.desc}%0A%0A_Contact for more info!_`;
        window.open(`https://wa.me/?text=${text}`, '_blank');
    }

    function toggleStatus(id) {
        let inv = JSON.parse(localStorage.getItem('babar_inventory'));
        let p = inv.find(x => x.id == id);
        p.status = p.status === 'Available' ? 'Sold' : 'Available';
        localStorage.setItem('babar_inventory', JSON.stringify(inv));
        displayInventory();
    }

    function searchPlots() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('inventory-card');
        for(let i=0; i<cards.length; i++) {
            cards[i].style.display = cards[i].innerText.toLowerCase().includes(val) ? "block" : "none";
        }
    }
</script>
</body>
</html>
