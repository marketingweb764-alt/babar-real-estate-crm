<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babar Real Estate - Inventory</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 30px; border-bottom: 2px solid #D4AF37; margin-bottom: 30px; }
        h1 { color: #D4AF37; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .search-box { text-align: center; margin-bottom: 30px; }
        input { padding: 12px; width: 80%; max-width: 400px; border-radius: 5px; border: 1px solid #D4AF37; background: #111; color: #fff; outline: none; }
        .table-container { overflow-x: auto; background: #111; border-radius: 10px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #D4AF37; color: #000; padding: 15px; text-align: left; text-transform: uppercase; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 15px; }
        tr:hover { background: #1a1a1a; }
        .view-btn { background: #D4AF37; color: #000; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 12px; display: inline-block; transition: 0.3s; }
        .view-btn:hover { background: #fff; transform: translateY(-2px); }
        .loading { text-align: center; font-size: 18px; color: #D4AF37; padding: 50px; font-weight: bold; }
        .price-tag { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>Babar Real Estate</h1>
    <p style="color: #aaa;">Live Property Inventory Management</p>
</div>

<div class="search-box">
    <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Search by Location, Size or Title...">
</div>

<div id="loading" class="loading">📡 Fetching Live Records from Google Sheets...</div>

<div class="table-container" id="tableWrapper" style="display:none;">
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Property Details</th>
                <th>Location</th>
                <th>Price (PKR)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // 1. Apni Sheet ID yahan confirm karein
    const SHEET_ID = '1vCis97Y553oE9p4PAn18i64-p-yYhFqYpEOfL29O-H8';
    // 2. CSV Export URL
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            
            // CSV lines ko split karna
            const rows = csvText.split('\n');
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            // Pehli line (Header) chor kar baki rows par kaam karna
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Proper CSV splitting
                
                if (cols.length >= 3) {
                    const title = cols[0].replace(/"/g, '').trim();
                    const location = cols[1].replace(/"/g, '').trim();
                    const price = cols[2].replace(/"/g, '').trim();

                    if(title === "") continue; // Khali rows skip karein

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${title}</strong></td>
                        <td>${location}</td>
                        <td class="price-tag">${price}</td>
                        <td>
                            <a href="ad-details.html?title=${encodeURIComponent(title)}&price=${encodeURIComponent(price)}&location=${encodeURIComponent(location)}" class="view-btn">VIEW AD</a>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                }
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('tableWrapper').style.display = 'block';

        } catch (error) {
            document.getElementById('loading').innerHTML = "❌ Error connecting to Sheet. Make sure it's 'Published to Web'.";
            console.error(error);
        }
    }

    function searchTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let tr = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < tr.length; i++) {
            let text = tr[i].innerText.toUpperCase();
            tr[i].style.display = text.indexOf(input) > -1 ? "" : "none";
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
