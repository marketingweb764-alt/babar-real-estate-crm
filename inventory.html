<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #D4AF37; font-size: 20px; margin: 0; text-transform: uppercase; }
        .back-btn { color: #fff; text-decoration: none; font-size: 12px; border: 1px solid #555; padding: 6px 12px; border-radius: 5px; }

        /* Search Bar */
        .search-container { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; outline: none; }
        #searchInput:focus { border-color: #D4AF37; }

        /* Admin Form */
        .admin-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #D4AF37; margin-bottom: 25px; display: none; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        .add-btn { background: #D4AF37; color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Inventory Cards */
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 15px; border: 1px solid #333; position: relative; }
        .status-badge { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .available { background: rgba(39, 174, 96, 0.2); color: #27ae60; border: 1px solid #27ae60; }
        .sold { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

        .card h3 { margin: 0; color: #D4AF37; font-size: 18px; }
        .card p { margin: 5px 0; color: #aaa; font-size: 13px; }
        .price-tag { font-size: 16px; color: #fff; font-weight: bold; margin-top: 10px; display: block; }
        
        .card-actions { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .btn-wa { background: #25D366; color: #fff; border: none; padding: 8px; border-radius: 6px; flex: 1; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-status { background: #444; color: #fff; border: none; padding: 8px; border-radius: 6px; flex: 1; cursor: pointer; font-size: 12px; }
        .btn-del { background: #e74c3c; color: #fff; border: none; padding: 8px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>Inventory</h1>
    <a href="index.html" class="back-btn">← Home</a>
</div>

<div class="search-container">
    <input type="text" id="searchInput" onkeyup="searchPlots()" placeholder="Search by Plot No, Sector or Price...">
</div>

<div class="admin-box" id="adminBox">
    <h2 style="font-size: 14px; margin-bottom: 15px; color: #D4AF37;">Add New Listing (CEO)</h2>
    <input type="text" id="pTitle" placeholder="Plot No. / Title">
    <input type="text" id="pSector" placeholder="Sector / Phase (e.g. DHA Ph 6)">
    <input type="text" id="pPrice" placeholder="Price (e.g. 3.5 Crore)">
    <textarea id="pDesc" placeholder="Additional Details..."></textarea>
    <button class="add-btn" onclick="addPlot()">LIST PROPERTY</button>
</div>

<div id="inventoryList" class="grid"></div>

<script>
    const userRole = sessionStorage.getItem('userRole');
    const CEO_PHONE = "923244000041"; // Aapka diya hua number format set kar diya

    window.onload = function() {
        if(userRole === 'CEO') {
            document.getElementById('adminBox').style.display = 'block';
        }
        displayInventory();
    }

    function addPlot() {
        const title = document.getElementById('pTitle').value;
        const sector = document.getElementById('pSector').value;
        const price = document.getElementById('pPrice').value;
        const desc = document.getElementById('pDesc').value;

        if(!title || !price) return alert("Fill essential fields!");

        let inventory = JSON.parse(localStorage.getItem('babar_inventory')) || [];
        inventory.unshift({ id: Date.now(), title, sector, price, desc, status: 'Available' });
        localStorage.setItem('babar_inventory', JSON.stringify(inventory));
        
        // Clear inputs
        document.getElementById('pTitle').value = '';
        document.getElementById('pSector').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pDesc').value = '';
        
        displayInventory();
    }

    function displayInventory() {
        const inventory = JSON.parse(localStorage.getItem('babar_inventory')) || [];
        const container = document.getElementById('inventoryList');
        
        container.innerHTML = inventory.map(p => `
            <div class="card inventory-card">
                <span class="status-badge ${p.status.toLowerCase()}">${p.status}</span>
                <h3>${p.title}</h3>
                <p>📍 ${p.sector}</p>
                <span class="price-tag">Rs. ${p.price}</span>
                <p style="font-size: 11px;">${p.desc}</p>
                
                <div class="card-actions">
                    <button class="btn-wa" onclick="shareWA('${p.id}')">📲 WhatsApp Details</button>
                    ${userRole === 'CEO' ? `
                        <button class="btn-status" onclick="toggleStatus(${p.id})">Mark Sold</button>
                        <button class="btn-del" onclick="deletePlot(${p.id})">🗑️</button>
                    ` : ''}
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#444;">No properties listed yet.</p>';
    }

    function shareWA(id) {
        const p = (JSON.parse(localStorage.getItem('babar_inventory'))).find(x => x.id == id);
        const text = `*BABAR REAL ESTATE - PROPERTY DETAILS*%0A%0A` +
                     `🏠 *Plot:* ${p.title}%0A` +
                     `📍 *Location:* ${p.sector}%0A` +
                     `💰 *Price:* Rs. ${p.price}%0A` +
                     `📊 *Status:* ${p.status}%0A` +
                     `📝 *Note:* ${p.desc}%0A%0A` +
                     `_Shared via Babar CRM Portal_`;
        
        // Open WhatsApp (Can be sent to anyone, but formatted for professional look)
        window.open(`https://wa.me/?text=${text}`, '_blank');
    }

    function searchPlots() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('inventory-card');
        for (let i = 0; i < cards.length; i++) {
            let text = cards[i].innerText.toLowerCase();
            cards[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    function toggleStatus(id) {
        let inv = JSON.parse(localStorage.getItem('babar_inventory'));
        let p = inv.find(x => x.id == id);
        p.status = p.status === 'Available' ? 'Sold' : 'Available';
        localStorage.setItem('babar_inventory', JSON.stringify(inv));
        displayInventory();
    }

    function deletePlot(id) {
        if(confirm("Remove this listing?")) {
            let inv = JSON.parse(localStorage.getItem('babar_inventory'));
            inv = inv.filter(x => x.id != id);
            localStorage.setItem('babar_inventory', JSON.stringify(inv));
            displayInventory();
        }
    }
</script>

</body>
</html>
