<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Babar Real Estate</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #D4AF37; margin-top: 30px; letter-spacing: 2px; text-transform: uppercase; }
        .table-container { max-width: 1100px; margin: 30px auto; background: #0a0a0a; border: 1px solid #333; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #D4AF37 !important; color: #000 !important; padding: 15px; font-size: 14px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 15px; color: #eee; }
        .view-btn { background: #D4AF37; color: #000; padding: 6px 12px; text-decoration: none; font-weight: bold; border-radius: 4px; font-size: 11px; }
        #loader { padding: 50px; color: #D4AF37; font-size: 18px; }
    </style>
</head>
<body>

    <h1>BABAR REAL ESTATE</h1>
    <p style="color:#666">Live Inventory Dashboard</p>

    <div id="loader">🔄 Connecting to Google Database...</div>
    <div class="table-container" id="table_div"></div>

    <script type="text/javascript">
        google.charts.load('current', {'packages':['table']});
        google.charts.setOnLoadCallback(drawTable);

        function drawTable() {
            // Sahi Google Sheet ID aur Query link
            var query = new google.visualization.Query('https://docs.google.com/spreadsheets/d/1lsiGLyJcp-uZpYNdQRIanSmTphxpqPZN9FcUwcQrLh5HVYGPbSEFe3xCljueEgilCrjjdHOXMnaU/gviz/tq?tqx=out:html');

            query.send(handleQueryResponse);
        }

        function handleQueryResponse(response) {
            if (response.isError()) {
                document.getElementById('loader').innerHTML = '❌ Error in query: ' + response.getMessage();
                return;
            }

            var data = response.getDataTable();
            var html = '<table><thead><tr><th>Property Details</th><th>Location</th><th>Price</th><th>Action</th></tr></thead><tbody>';

            for (var row = 0; row < data.getNumberOfRows(); row++) {
                var title = data.getValue(row, 0) || "";
                var loc = data.getValue(row, 1) || "";
                var price = data.getValue(row, 2) || "";
                
                html += '<tr>' +
                        '<td><strong>' + title + '</strong></td>' +
                        '<td>' + loc + '</td>' +
                        '<td style="color:#2ecc71; font-weight:bold;">' + price + '</td>' +
                        '<td><a href="ad-details.html?title=' + encodeURIComponent(title) + '&price=' + encodeURIComponent(price) + '&location=' + encodeURIComponent(loc) + '" class="view-btn">VIEW AD</a></td>' +
                        '</tr>';
            }
            html += '</tbody></table>';

            document.getElementById('loader').style.display = 'none';
            document.getElementById('table_div').innerHTML = html;
        }
    </script>
</body>
</html>
