<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installment Calculator - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #D4AF37; font-size: 18px; margin: 0; text-transform: uppercase; }
        .back-btn { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; }

        .calc-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 500px; margin: auto; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; color: #888; font-size: 12px; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 16px; box-sizing: border-box; }
        
        .result-box { margin-top: 25px; padding: 20px; background: #D4AF37; color: #000; border-radius: 10px; display: none; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; }
        .result-item b { font-size: 18px; }
        
        button { width: 100%; padding: 15px; background: #D4AF37; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #fff; }
    </style>
</head>
<body>

<div class="header">
    <h1>Payment Calculator</h1>
    <a href="index.html" class="back-btn">← Dashboard</a>
</div>

<div class="calc-box">
    <div class="input-group">
        <label>Total Property Price (PKR)</label>
        <input type="number" id="totalPrice" placeholder="e.g. 5000000">
    </div>
    
    <div class="input-group">
        <label>Down Payment (PKR)</label>
        <input type="number" id="downPayment" placeholder="e.g. 1000000">
    </div>

    <div class="input-group">
        <label>Installment Period (Months)</label>
        <input type="number" id="months" placeholder="e.g. 12, 24, 36">
    </div>

    <button onclick="calculate()">CALCULATE PLAN</button>

    <div class="result-box" id="result">
        <div class="result-item">
            <span>Remaining Amount:</span>
            <b id="resRemaining">0</b>
        </div>
        <div class="result-item">
            <span>Monthly Installment:</span>
            <b id="resMonthly">0</b>
        </div>
        <p style="font-size: 10px; text-align: center; margin-top: 10px; opacity: 0.7;">*This is an estimated calculation for Babar Real Estate.</p>
    </div>
</div>

<script>
    function calculate() {
        const total = document.getElementById('totalPrice').value;
        const down = document.getElementById('downPayment').value;
        const months = document.getElementById('months').value;

        if(!total || !down || !months) {
            alert("Please fill all fields");
            return;
        }

        const remaining = total - down;
        const monthly = remaining / months;

        document.getElementById('resRemaining').innerText = remaining.toLocaleString() + " /-";
        document.getElementById('resMonthly').innerText = Math.round(monthly).toLocaleString() + " /-";
        
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
