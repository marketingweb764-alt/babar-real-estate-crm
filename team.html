<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Management - Babar Real Estate</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #D4AF37; font-size: 18px; margin: 0; text-transform: uppercase; }
        .back-btn { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; }

        .add-section { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #D4AF37; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .add-btn { background: #D4AF37; color: #000; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .member-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .member-info h3 { margin: 0; font-size: 16px; color: #D4AF37; }
        .member-info p { margin: 2px 0; font-size: 12px; color: #666; }
        
        .del-btn { background: #e74c3c; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .empty-msg { text-align: center; color: #444; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Team Management</h1>
    <a href="index.html" class="back-btn">← Dashboard</a>
</div>

<div class="add-section">
    <h2 style="font-size: 14px; margin-bottom: 15px; color: #888;">Register New Team Member</h2>
    <input type="text" id="memberName" placeholder="Member Full Name">
    <input type="text" id="memberRole" placeholder="Role (e.g. Sales Executive)">
    <button class="add-btn" onclick="addMember()">ADD TO TEAM</button>
</div>

<div id="teamList">
    <p class="empty-msg">No members added yet.</p>
</div>

<script>
    function addMember() {
        const name = document.getElementById('memberName').value;
        const role = document.getElementById('memberRole').value;
        if(!name || !role) return;

        let team = JSON.parse(localStorage.getItem('babar_team')) || [];
        team.unshift({ name, role, id: Date.now() });
        localStorage.setItem('babar_team', JSON.stringify(team));

        document.getElementById('memberName').value = '';
        document.getElementById('memberRole').value = '';
        displayTeam();
    }

    function deleteMember(id) {
        let team = JSON.parse(localStorage.getItem('babar_team'));
        team = team.filter(m => m.id !== id);
        localStorage.setItem('babar_team', JSON.stringify(team));
        displayTeam();
    }

    function displayTeam() {
        const team = JSON.parse(localStorage.getItem('babar_team')) || [];
        const container = document.getElementById('teamList');
        
        if(team.length === 0) {
            container.innerHTML = '<p class="empty-msg">No members added yet.</p>';
            return;
        }

        container.innerHTML = team.map(m => `
            <div class="member-card">
                <div class="member-info">
                    <h3>${m.name}</h3>
                    <p>${m.role}</p>
                </div>
                <button class="del-btn" onclick="deleteMember(${m.id})">Remove</button>
            </div>
        `).join('');
    }

    window.onload = displayTeam;
</script>

</body>
</html>
